# AlgoTrade — Render.com deployment
# Free tier: 750 hrs/month backend + static frontend hosting
# One-click deploy: https://render.com/deploy
#
# Setup steps:
#   1. Push this repo to GitHub (already done)
#   2. Go to https://dashboard.render.com → New → Blueprint
#   3. Connect your GitHub repo → select this file
#   4. Set env vars: SECRET_KEY, DHAN_CLIENT_ID, DHAN_ACCESS_TOKEN
#   5. Click Deploy — done. Access from any device worldwide.

services:

  # ── Backend API (FastAPI) ────────────────────────────────────
  - type: web
    name: algotrade-backend
    runtime: python
    region:           
    plan: free
    rootDir: .
    buildCommand: pip install -r app/backend/requirements.txt
    startCommand: cd app/backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true    # auto-generated secure key
      - key: DHAN_CLIENT_ID
        sync: false            # set manually in Render dashboard
      - key: DHAN_ACCESS_TOKEN
        sync: false            # set manually in Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /health

  # ── Frontend (React static site) ────────────────────────────
  - type: web
    name: algotrade-frontend
    runtime: static
    region: 
    plan: free
    rootDir: app/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: algotrade-backend
          type: web
          property: host
          prepend: https://
      - key: VITE_WS_URL
        fromService:
          name: algotrade-backend
          type: web
          property: host
          prepend: wss://
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
